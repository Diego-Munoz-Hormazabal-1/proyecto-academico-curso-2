# Define el nombre de la aplicación Spring Boot. Sirve para identificarla en logs, monitoreo y microservicios.
spring.application.name=curso
spring.web.error.include-binding-errors=always
spring.web.error.include-message=always
spring.datasource.url=jdbc:mysql://localhost:3306/full_stack_curso?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=full_stack_1
spring.datasource.password=Tav_2026.@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialecto Hibernate específico para MySQL. Optimiza SQL con funciones nativas de MySQL.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ===========================================================================================================================
# POOL DE CONEXIONES HIKARICP (REUTILIZACIÓN DE CONEXIONES)
# ===========================================================================================================================
# Tiempo máximo de espera (en milisegundos) para obtener una conexión del pool. 30000ms = 30 segundos.
spring.datasource.hikari.connection-timeout=30000
# Número máximo de conexiones simultáneas en el pool. 10 es adecuado para apps medianas/desarrollo.
spring.datasource.hikari.maximum-pool-size=10
server.port=5001
springdoc.swagger-ui.path=/curso.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=alpha

app.name=Gestion de curso
app.version=3.0.0
